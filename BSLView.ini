; BSLView - 1C:Enterprise BSL/OS Syntax Highlighting Plugin
; for Total Commander Lister (F3)

[Options]
; Font family for code display
FontFamily=Consolas, Courier New, monospace

; Font size in pixels
FontSize=14

; Tab size in spaces (for tab->space conversion)
TabSize=4

; Show line numbers
LineNumbers=1

; Theme: auto (follow TC), light (1C Configurator style), dark
Theme=auto

; Use Monaco Editor via WebView2 (1=yes, 0=use IE fallback)
UseMonaco=1

[Extensions]
; File extensions handled by this plugin
BSLExtensions=bsl;os
; Query language extensions
QueryExtensions=sdbl;query
